<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FF14 Collection Notebook</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="side-rail" aria-label="Navigation">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">XIV</div>
          <div>
            <h1>FF14 Collection Notebook</h1>
            <p>Collection Register</p>
          </div>
        </div>

        <div class="rail-section">
          <p class="rail-label">カテゴリ</p>
          <nav class="nav-stack category-stack" aria-label="Collection categories">
            <button class="nav-item category-button" data-category="mount" type="button">
              <span class="nav-glyph" aria-hidden="true"></span>
              マウント
            </button>
            <button class="nav-item category-button active" data-category="minion" type="button">
              <span class="nav-glyph" aria-hidden="true"></span>
              ミニオン
            </button>
            <button class="nav-item category-button" data-category="orchestrion" type="button">
              <span class="nav-glyph" aria-hidden="true"></span>
              オーケストリオン譜
            </button>
            <button class="nav-item category-button" data-category="card" type="button">
              <span class="nav-glyph" aria-hidden="true"></span>
              トリプルトライアドカード
            </button>
            <button class="nav-item category-button" data-category="emote" type="button">
              <span class="nav-glyph" aria-hidden="true"></span>
              エモート
            </button>
            <button class="nav-item category-button" data-category="spell" type="button">
              <span class="nav-glyph" aria-hidden="true"></span>
              青魔法
            </button>
            <button class="nav-item category-button" data-category="hairstyle" type="button">
              <span class="nav-glyph" aria-hidden="true"></span>
              髪型
            </button>
            <button class="nav-item category-button" data-category="fashion" type="button">
              <span class="nav-glyph" aria-hidden="true"></span>
              傘/ファッションアクセサリー
            </button>
          </nav>
        </div>

        <div class="rail-footer">
          <span>© SQUARE ENIX</span>
          <span>Local JSON</span>
        </div>
      </aside>

      <main class="workspace">
        <header class="top-bar">
          <div class="page-title">
            <span class="kicker">Collection</span>
            <h2 id="categoryTitle">ミニオン</h2>
          </div>
          <div class="action-row">
            <button id="refreshCatalog" class="button ghost" type="button">カタログ更新</button>
            <button id="exportProgress" class="button ghost" type="button">書き出し</button>
            <label class="button ghost file-label">
              読み込み
              <input id="importProgress" type="file" accept="application/json">
            </label>
          </div>
        </header>

        <section class="stats-band" aria-label="Collection summary">
          <div class="stat-tile">
            <span class="stat-label">取得率</span>
            <strong id="completionRate">0%</strong>
            <span id="completionCount">0 / 0</span>
          </div>
          <div class="stat-tile">
            <span class="stat-label">欲しい</span>
            <strong id="wantedCount">0</strong>
            <span>Marked</span>
          </div>
          <div class="stat-tile">
            <span class="stat-label">優先度 高</span>
            <strong id="highPriorityCount">0</strong>
            <span>High</span>
          </div>
          <div class="stat-tile">
            <span class="stat-label">最新パッチ</span>
            <strong id="latestPatch">-</strong>
            <span id="catalogUpdated">Seed</span>
          </div>
        </section>

        <section class="controls-band" aria-label="Filters">
          <div class="search-box">
            <span class="search-symbol" aria-hidden="true"></span>
            <input id="searchInput" type="search" placeholder="名前・入手方法・パッチで検索">
          </div>

          <div class="lodestone-box">
            <input id="lodestoneInput" type="text" placeholder="Lodestone キャラクターURL / ID">
            <button id="importLodestone" class="button" type="button">Lodestone読込</button>
          </div>

          <div class="segmented" role="group" aria-label="Status filter">
            <button class="segment active" data-status="all" type="button">すべて</button>
            <button class="segment" data-status="missing" type="button">未取得</button>
            <button class="segment" data-status="owned" type="button">取得済み</button>
            <button class="segment" data-status="wanted" type="button">欲しい</button>
          </div>

          <div class="select-row">
            <select id="sourceFilter" aria-label="Source filter">
              <option value="all">入手種別: すべて</option>
            </select>

            <select id="versionFilter" aria-label="Version filter">
              <option value="all">バージョン: すべて</option>
            </select>

            <select id="sortSelect" aria-label="Sort">
              <option value="patch-desc">パッチ 新しい順</option>
              <option value="name-asc">名前 A-Z</option>
              <option value="source-asc">入手種別 A-Z</option>
              <option value="priority-desc">優先度 高い順</option>
            </select>

            <div class="view-toggle" role="group" aria-label="表示方法">
              <button class="view-button active" data-layout="grid" type="button">5列</button>
              <button class="view-button" data-layout="list" type="button">リスト</button>
            </div>
          </div>
        </section>

        <div class="content-grid">
          <section class="list-area" aria-label="Collection list">
            <div id="resultMeta" class="result-meta">0件</div>
            <div id="minionGrid" class="minion-grid"></div>
          </section>

          <aside class="detail-panel" aria-label="Selected collection item">
            <button id="detailClose" class="detail-close" type="button" aria-label="詳細を閉じる" title="閉じる">×</button>
            <div id="detailContent" class="detail-empty">
              <div class="empty-sigil" aria-hidden="true"></div>
              <p>アイテムを選択</p>
            </div>
          </aside>
        </div>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
  </body>
</html>
